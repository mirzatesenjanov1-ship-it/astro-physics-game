<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmos Odyssey: Physics Quest</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="main-menu" class="overlay">
        <h1>COSMOS ODYSSEY</h1>
        <p>Explore the wonders of Astrophysics</p>
        <div class="menu-buttons">
            <button onclick="showLevels()">Start Mission</button>
            <button class="boosty-promo" onclick="enterPremiumLab()">Premium Lab Mode</button>
        </div>
    </div>

    <div id="level-menu" class="overlay" style="display: none;">
        <h2>Select Mission</h2>
        <div class="level-grid">
            <button onclick="startLevel(1)">1. Orbital Mechanics</button>
            <button onclick="startLevel(2)">2. Stellar Evolution</button>
            <button onclick="startLevel(3)">3. Black Hole Event Horizon</button>
            <button onclick="startLevel(4)">4. The Big Bang: Nucleosynthesis</button>
        </div>
        <button class="back-btn" onclick="backToMenu()">Back</button>
    </div>

    <div id="game-ui" style="display: none;">
        <div class="stats">Velocity: <span id="speed-val">0</span> km/s</div>
        <button class="reset-btn" onclick="location.reload()">Reset Mission</button>
    </div>

    <div id="success-screen" class="achievement-popup">
        <h2 id="success-title">MISSION SUCCESS!</h2>
        <p id="success-message">You have mastered the laws of physics.</p>
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <button class="boosty-promo" onclick="window.open('https://boosty.to/astrophysica/purchase/3923515?ssource=DIRECT&share=subscription_link', '_blank')">
                Unlock Bonus Levels on Boosty
            </button>
            <button onclick="location.reload()">Back to Menu</button>
        </div>
    </div>

    <div class="ad-container">
        <span class="ad-label">Advertisement</span>
        <div id="adsense-slot" style="width: 728px; height: 90px; background: rgba(255,255,255,0.05); border: 1px dashed #333; display: flex; align-items: center; justify-content: center;">
            <span style="color: #444; font-size: 12px;">Google AdSense Banner Space</span>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="game.js"></script>
    
    <script>
        // Ийгилик терезесин көрсөтүү
        function showSuccess(msg) {
            document.getElementById('game-ui').style.display = 'none';
            document.getElementById('success-screen').style.display = 'block';
            document.getElementById('success-message').innerText = msg;
        }

        // Реклама блогун деңгээл ичинде жашырып/көрсөтүү (опционалдуу)
        function toggleAds(show) {
            document.querySelector('.ad-container').style.display = show ? 'flex' : 'none';
        }
    </script>
</body>
</html>
